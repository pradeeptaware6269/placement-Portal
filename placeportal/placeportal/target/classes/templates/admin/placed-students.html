<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Placed Students – Placement Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/}">Placement<span>Portal</span></a>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/applications}">Applications</a>
        <a th:href="@{/admin/placed-students}" class="active">Placed</a>
        <a th:href="@{/admin/logout}">Logout</a>
    </div>
</nav>
<div class="container">
    <h1 class="page-title">🏆 Placed Students</h1>
    <div class="card">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>#</th><th>Name</th><th>Email</th><th>Course</th><th>Branch</th><th>CGPA</th><th>Status</th></tr>
                </thead>
                <tbody>
                    <tr th:if="${students.empty}">
                        <td colspan="7" style="text-align:center; color:#64748B;">No students placed yet.</td>
                    </tr>
                    <tr th:each="s, stat : ${students}">
                        <td th:text="${stat.count}"></td>
                        <td><strong th:text="${s.fullName}"></strong></td>
                        <td th:text="${s.email}"></td>
                        <td th:text="${s.course}"></td>
                        <td th:text="${s.branch}"></td>
                        <td th:text="${s.cgpa}"></td>
                        <td><span class="badge badge-placed">PLACED</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
