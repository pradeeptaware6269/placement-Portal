<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Login – Placement Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/}">Placement<span>Portal</span></a>
</nav>
<div class="login-wrap">
    <div class="login-box">
        <div style="text-align:center; margin-bottom:20px;">
            <div style="font-size:2.8rem;">👨‍🎓</div>
            <h2>Student Login</h2>
            <p class="sub">Enter your credentials to continue</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/student/login}" method="post">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="student@college.edu"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••"/>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <p style="text-align:center; margin-top:18px; color:#64748B; font-size:.9rem;">
            New here? <a th:href="@{/student/register}" style="color:#4F46E5;">Register</a> &nbsp;|&nbsp;
            <a th:href="@{/}" style="color:#4F46E5;">Home</a>
        </p>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
