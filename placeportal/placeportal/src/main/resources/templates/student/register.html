<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Registration – Placement Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/}">Placement<span>Portal</span></a>
    <div class="nav-links">
        <a th:href="@{/student/login}">Login</a>
    </div>
</nav>

<div class="container" style="max-width:700px;">
    <div class="card">
        <h2 class="page-title">📝 Student Registration</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/student/register}" method="post" th:object="${student}">
            <h3 class="card-header">Account Details</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" class="form-control" th:field="*{fullName}" required placeholder="Your full name"/>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" class="form-control" th:field="*{email}" required placeholder="college@example.com"/>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="password" class="form-control" th:field="*{password}" required minlength="6"/>
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPassword" class="form-control" required minlength="6"/>
                </div>
            </div>

            <h3 class="card-header" style="margin-top:10px;">Personal & Academic Details</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" class="form-control" th:field="*{phone}" placeholder="10-digit mobile"/>
                </div>
                <div class="form-group">
                    <label>Course</label>
                    <select class="form-control" th:field="*{course}">
                        <option value="">Select Course</option>
                        <option value="B.Tech">B.Tech</option>
                        <option value="M.Tech">M.Tech</option>
                        <option value="BCA">BCA</option>
                        <option value="MCA">MCA</option>
                        <option value="B.Sc">B.Sc</option>
                        <option value="MBA">MBA</option>
                    </select>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Branch</label>
                    <select class="form-control" th:field="*{branch}">
                        <option value="">Select Branch</option>
                        <option value="CSE">Computer Science (CSE)</option>
                        <option value="IT">Information Technology (IT)</option>
                        <option value="ECE">Electronics &amp; Communication (ECE)</option>
                        <option value="EEE">Electrical &amp; Electronics (EEE)</option>
                        <option value="ME">Mechanical Engineering (ME)</option>
                        <option value="CE">Civil Engineering (CE)</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Passing Year</label>
                    <select class="form-control" th:field="*{passingYear}">
                        <option value="">Select Year</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                    </select>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>CGPA (out of 10)</label>
                    <input type="number" id="cgpa" class="form-control" th:field="*{cgpa}" step="0.01" min="0" max="10" placeholder="e.g. 8.5"/>
                </div>
                <div class="form-group">
                    <label>Skills <small style="color:#64748B">(comma-separated)</small></label>
                    <input type="text" class="form-control" th:field="*{skills}" placeholder="Java, Python, SQL, React"/>
                </div>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" class="form-control" th:field="*{address}" placeholder="City, State"/>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">Register</button>
            <p style="text-align:center; margin-top:14px; color:#64748B; font-size:.9rem;">
                Already registered? <a th:href="@{/student/login}" style="color:#4F46E5;">Login here</a>
            </p>
        </form>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
