<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Post Job – Placement Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/}">Placement<span>Portal</span></a>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/companies}">Companies</a>
        <a th:href="@{/admin/jobs}" class="active">Jobs</a>
        <a th:href="@{/admin/logout}">Logout</a>
    </div>
</nav>
<div class="container" style="max-width:720px;">
    <div class="card">
        <h2 class="page-title">📝 Post New Job</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/admin/jobs/post}" method="post" th:object="${job}">
            <h3 class="card-header">Job Details</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Job Role *</label>
                    <input type="text" class="form-control" th:field="*{role}" required placeholder="e.g. Software Engineer"/>
                </div>
                <div class="form-group">
                    <label>Company *</label>
                    <select class="form-control" name="companyId" required>
                        <option value="">Select Company</option>
                        <option th:each="c : ${companies}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Package Offered (LPA)</label>
                    <input type="number" class="form-control" th:field="*{packageOffered}" step="0.1" min="0" placeholder="e.g. 6.5"/>
                </div>
                <div class="form-group">
                    <label>Application Deadline</label>
                    <input type="date" class="form-control" th:field="*{applicationDeadline}"/>
                </div>
            </div>
            <div class="form-group">
                <label>Job Description</label>
                <textarea class="form-control" th:field="*{jobDescription}" rows="3" placeholder="Role responsibilities and details..."></textarea>
            </div>

            <h3 class="card-header" style="margin-top:10px;">Eligibility Criteria</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Minimum CGPA</label>
                    <input type="number" class="form-control" th:field="*{minCgpa}" step="0.1" min="0" max="10" placeholder="e.g. 7.0"/>
                </div>
                <div class="form-group">
                    <label>Required Branch</label>
                    <input type="text" class="form-control" th:field="*{requiredBranch}" placeholder="CSE,IT or ALL"/>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Passing Year</label>
                    <select class="form-control" th:field="*{passingYear}">
                        <option value="">Any Year</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Required Skills <small style="color:#64748B">(comma-separated)</small></label>
                    <input type="text" class="form-control" th:field="*{requiredSkills}" placeholder="Java, Spring Boot, MySQL"/>
                </div>
            </div>

            <div style="display:flex; gap:12px; margin-top:8px;">
                <button type="submit" class="btn btn-primary">Post Job</button>
                <a th:href="@{/admin/jobs}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
